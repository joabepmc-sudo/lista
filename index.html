<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>StudyShorts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🏠 TELA INICIAL -->
<div id="home">
  <h1>📚 Escolha a matéria</h1>

  <button class="materia" data-arquivo="direito.txt">Direito</button>
  <button class="materia" data-arquivo="portugues.txt">Português</button>
  <button class="materia" data-arquivo="engenharia.txt">Engenharia</button>
</div>

<!-- 📱 APP -->
<div id="app" style="display:none;">

  <div id="topbar">
    <span id="progresso">0 / 0</span>
  </div>

  <div id="container"></div>

  <div id="controls">
    <button id="prevBtn">⬆️</button>
    <button id="nextBtn">⬇️</button>
  </div>

  <div id="actions">
    <div id="leftActions">
      <button id="reviewBtn">🔁 Revisar</button>
      <button id="resetBtn">🔄 Reiniciar</button>
    </div>

    <button id="knowBtn">✅ Já sei</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
